    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="site-wrapper">
        <nav class="main-nav">
            <div class="nav-container">
                <div class="logo"><span class="logo-text">THE 7 BILLION DOLLAR BRAIN</span></div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="doctrine.html">The Code</a></li>

        <section class="page-header">
            <h1>Inner Circle Application</h1>
        </section>

        <section class="application-form">
            <div class="form-container">
                <form id="inner-circle-application">
                    <div class="form-group"><label>Full Name *</label><input type="text" id="full-name" required></div>
                    <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
                    <div class="form-group"><label>State *</label><select id="state"><option>Select</option><option>NY</option><option>CA</option><option>GA</option><option>TX</option><option>IL</option></select></div>
                    <div class="form-group"><label>Why are you applying? *</label><textarea id="why-apply" rows="4" required></textarea></div>
                    <div class="form-group"><label>Which of the 7 C's resonates most? *</label><textarea id="which-c" rows="3" required></textarea></div>
                    <div class="form-submit"><button type="submit" class="btn btn-primary">Submit Application</button></div>
                </form>
                <div id="application-message" class="form-message"></div>
            </div>
        </section>

        <footer class="site-footer"><div class="footer-bottom"><p>© 2024 The 7 Billion Dollar Brain™</p></div></footer>
    </div>
    <script src="script.js"></script>
